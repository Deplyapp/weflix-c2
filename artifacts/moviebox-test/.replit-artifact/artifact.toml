kind = "web"
previewPath = "/"
title = "WeFlix C2"
version = "1.0.0"
id = "artifacts/moviebox-test"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24082

[services.development]
run = "pnpm --filter @workspace/moviebox-test run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/moviebox-test", "run", "build" ]
publicDir = "artifacts/moviebox-test/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24082"
BASE_PATH = "/"
